name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Docker Compose files
        run: |
          docker compose --env-file .env.example -f docker-compose.yaml config
          docker compose --env-file .env.production.example -f docker-compose.production.yaml config
          docker compose --env-file .env.production.example -f docker-compose.fuenlabrada.production.yaml config
          docker compose --env-file connectors/normal/.env.example -f connectors/normal/docker-compose.yaml config
          docker compose --env-file connectors/star/.env.example -f connectors/star/docker-compose.yaml config

      - name: Check frontend JavaScript syntax
        run: |
          node --check caas/edc-ui/public/assets/ui/02f-star.js
          node --check caas/edc-ui/public/assets/ui/02g-download.js
          node --check caas/edc-ui/public/assets/ui/02h-arcgis.js
          node --check caas/edc-ui/public/assets/ui/02i-management.js

      - name: Start local reproduction stack
        run: |
          cp .env.example .env
          docker compose --env-file .env -f docker-compose.yaml up -d --build

      - name: Run functional smoke checks
        run: |
          chmod +x scripts/validate_stack.sh scripts/validate_local_asset_upload.sh scripts/validate_download_capture.sh
          ./scripts/validate_stack.sh
          ./scripts/validate_local_asset_upload.sh
          ./scripts/validate_download_capture.sh

      - name: Show compose logs on failure
        if: failure()
        run: docker compose --env-file .env -f docker-compose.yaml logs --no-color --tail=200

      - name: Stop local reproduction stack
        if: always()
        run: docker compose --env-file .env -f docker-compose.yaml down
