services:
  uc3m-postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: change-me
    command: sh -c "echo 'CREATE DATABASE uc3m_db;'  > /docker-entrypoint-initdb.d/init.sql
      && docker-entrypoint.sh postgres"
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U postgres
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
    - edc-net
  uc3m-connector:
    depends_on:
      uc3m-postgres:
        condition: service_healthy
    environment:
      EDC_PARTICIPANT_ID: uc3m-connector
      WEB_HTTP_PORT: 11000
      WEB_HTTP_PATH: /api
      WEB_HTTP_CONTROL_PORT: 11001
      WEB_HTTP_CONTROL_PATH: /api/control
      WEB_HTTP_MANAGEMENT_PORT: 11002
      WEB_HTTP_MANAGEMENT_PATH: /api/management
      WEB_HTTP_PROTOCOL_PORT: 11003
      WEB_HTTP_PROTOCOL_PATH: /api/v1/dsp
      EDC_DSP_CALLBACK_ADDRESS: https://gis.eiteldata.eu/conectoruc3m/api/v1/dsp
      EDC_MANAGEMENT_CONTEXT_ENABLED: 'true'
      EDC_JDBC_URL: jdbc:postgresql://uc3m-postgres:5432/uc3m_db
      EDC_JDBC_USER: postgres
      EDC_JDBC_PASSWORD: change-me
      EDC_API_AUTH_KEY: change-me
      EDC_UI_WRAPPER_ENABLED: 'true'
      EDC_WEB_REST_CORS_ENABLED: 'true'
      EDC_WEB_REST_CORS_HEADERS: origin,content-type,accept,x-api-key,authorization
      EDC_WEB_REST_CORS_METHODS: GET,POST,PUT,DELETE,OPTIONS
      EDC_WEB_REST_CORS_ORIGINS: https://gis.eiteldata.eu
    networks:
    - edc-net
    build:
      context: https://github.com/mariwogr/EITELConnector.git#main
      dockerfile: deploy/Dockerfile
    image: eitel/eclipse-edc-runtime:0.16.0
  uc3m-ui:
    image: eitel/edc-ui:latest
    depends_on:
    - uc3m-connector
    environment:
      NEXT_PUBLIC_MANAGEMENT_API_URL: /conectoruc3m/api/management
      NEXT_PUBLIC_MANAGEMENT_API_AUTH_KEY: change-me
      NEXT_PUBLIC_CONNECTOR_NAME: UC3M
      EDC_UI_MANAGEMENT_API_URL: http://uc3m-connector:11002/api/management
      EDC_UI_MANAGEMENT_API_AUTH_KEY: change-me
    networks:
    - edc-net
networks:
  edc-net:
    driver: bridge
