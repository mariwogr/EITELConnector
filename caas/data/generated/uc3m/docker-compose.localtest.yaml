services:
  uc3m-postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: change-me
    command: >
      sh -c "echo 'CREATE DATABASE uc3m_db;' > /docker-entrypoint-initdb.d/init.sql && docker-entrypoint.sh postgres"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - edc-net

  uc3m-connector:
    image: eitel/eclipse-edc-runtime:latest
    depends_on:
      uc3m-postgres:
        condition: service_healthy
    ports:
      - "11002:11002"
      - "11003:11003"
    environment:
      EDC_PARTICIPANT_ID: conector
      EDC_FIRST_PORT: 11000
      EDC_FQDN_PUBLIC: localhost
      EDC_DSP_CALLBACK_ADDRESS: http://localhost:11003/api/v1/dsp
      EDC_JDBC_URL: jdbc:postgresql://uc3m-postgres:5432/uc3m_db
      EDC_JDBC_USER: postgres
      EDC_JDBC_PASSWORD: change-me
      EDC_API_AUTH_KEY: change-me
      EDC_UI_WRAPPER_ENABLED: "true"
      EDC_WEB_REST_CORS_ENABLED: "true"
      EDC_WEB_REST_CORS_HEADERS: "origin,content-type,accept,x-api-key,authorization"
      EDC_WEB_REST_CORS_METHODS: "GET,POST,PUT,DELETE,OPTIONS"
      EDC_WEB_REST_CORS_ORIGINS: "http://localhost:12000"
    networks:
      - edc-net

  uc3m-ui:
    image: eitel/edc-ui:latest
    depends_on:
      - uc3m-connector
    ports:
      - "12000:8080"
    environment:
      NEXT_PUBLIC_MANAGEMENT_API_URL: http://localhost:11002/api/management
      NEXT_PUBLIC_MANAGEMENT_API_AUTH_KEY: change-me
      NEXT_PUBLIC_CONNECTOR_NAME: UC3M
      EDC_UI_MANAGEMENT_API_URL: http://uc3m-connector:11002/api/management
      EDC_UI_MANAGEMENT_API_AUTH_KEY: change-me
    networks:
      - edc-net

networks:
  edc-net:
    driver: bridge
