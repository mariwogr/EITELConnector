        <h2 style="margin:0">Asset publicado</h2>

      sourceMode: 'local-file',
      baseUrl: 'http://conectorfuenlabrada-local-assets:8081/v1/local-assets/files',
      path: '/b0bd4924dbdd43fea7ffdf5237e58e1a/FortiClientInstaller.exe',
      authType: 'none',
      localUpload: {
        fileId: 'b0bd4924dbdd43fea7ffdf5237e58e1a',
        filename: 'FortiClientInstaller.exe',
        contentType: 'application/x-msdownload',
        bytes: 5157048,

    const btn = document.getElementById('btnTheme');
    btn.addEventListener('click', () => {
      const dark = document.body.dataset.theme === 'dark';
      document.body.dataset.theme = dark ? 'light' : 'dark';
      btn.textContent = dark ? 'Cambiar a oscuro' : 'Cambiar a claro';
