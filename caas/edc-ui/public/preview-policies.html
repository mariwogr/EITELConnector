<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Preview · Listar policies</title>
  <link rel="stylesheet" href="assets/ui.css?v=20260605b" />
  <style>
    /* Preview-only chrome (not part of the app) */
    body { padding: 24px; }
    .preview-bar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 18px; }
    .preview-bar h1 { font-size: 16px; margin: 0 12px 0 0; }
    .preview-note { color: var(--muted); font-size: 12px; margin: 0 0 18px; }
    section.card.wide { max-width: 980px; }
  </style>
</head>
<body data-theme="light">
  <div class="preview-bar">
    <h1>Preview · "Listar policies"</h1>
    <button class="ghost" id="btnTheme">Cambiar a oscuro</button>
  </div>
  <p class="preview-note">Vista previa estática del panel de policies. Usa el render real (<code>buildPoliciesHtml</code>) y el CSS real (<code>ui.css</code>). No necesita backend.</p>

  <section class="card wide">
    <h2>Definir política de uso</h2>
    <div class="row" style="margin-top:8px">
      <button class="primary">Crear/Actualizar policy</button>
      <button class="ghost" id="btnList">Listar policies</button>
      <button class="danger">Borrar policy</button>
    </div>
    <div id="policiesResult" class="cdef-result" style="display:none"></div>
  </section>

  <script>
    // Minimal stand-ins for the globals the builder needs.
    function htmlEscape(v) {
      return String(v || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }
    const unwrap = (p) => Array.isArray(p?.data) ? p.data : (Array.isArray(p?.data?.value) ? p.data.value : (Array.isArray(p?.data?.content) ? p.data.content : []));
    function policyAccessLevelLabel(level) {
      switch (String(level || '')) {
        case 'public': return 'Público';
        case 'private': return 'Privado (requiere solicitud)';
        case 'partners': return 'Solo entidades colaboradoras';
        case 'internal': return 'Uso interno del proyecto';
        default: return level ? String(level) : '';
      }
    }
  </script>
  <script src="assets/ui/02i-management.js?v=20260605b"></script>
  <script>
    const sample = { status: 200, attempt: 0, data: [
      { '@id': 'policy-prueba-geojson', '@type': 'PolicyDefinition', createdAt: 1780650067879, policy: { '@type': 'Set', permission: [], prohibition: [], obligation: [] }, privateProperties: { 'eitel:purpose': 'analytics', 'eitel:accessDuration': 'always', 'eitel:accessLevel': 'public', 'eitel:prohibition': '[]', 'eitel:obligation': '[]' } },
      { '@id': 'policy-privae', '@type': 'PolicyDefinition', createdAt: 1780650069623, policy: { '@type': 'Set' }, privateProperties: { 'eitel:purpose': 'analytics', 'eitel:accessDuration': 'always', 'eitel:accessLevel': 'private', 'eitel:prohibition': '[]', 'eitel:obligation': '[]' } },
      { '@id': 'policy-data', '@type': 'PolicyDefinition', createdAt: 1780650069027, policy: { '@type': 'Set' }, privateProperties: { 'eitel:purpose': 'analytics', 'eitel:accessDuration': 'always', 'eitel:accessLevel': 'public', 'eitel:prohibition': '[]', 'eitel:obligation': '[]' } },
      { '@id': 'policy-prueba-geolocalizada', '@type': 'PolicyDefinition', createdAt: 1780650067344, policy: { '@type': 'Set' }, privateProperties: { 'eitel:purpose': 'commercial', 'eitel:accessDuration': '1-year', 'eitel:accessLevel': 'private', 'eitel:prohibition': '["http://www.w3.org/ns/odrl/2/distribute"]', 'eitel:obligation': '["http://www.w3.org/ns/odrl/2/attribute"]' } }
    ]};

    const box = document.getElementById('policiesResult');
    function render() {
      box.innerHTML = buildPoliciesHtml(sample);
      box.style.display = 'block';
    }
    document.getElementById('btnList').addEventListener('click', render);
    render();

    const btn = document.getElementById('btnTheme');
    btn.addEventListener('click', () => {
      const dark = document.body.dataset.theme === 'dark';
      document.body.dataset.theme = dark ? 'light' : 'dark';
      btn.textContent = dark ? 'Cambiar a oscuro' : 'Cambiar a claro';
    });
  </script>
</body>
</html>
