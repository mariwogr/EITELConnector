    healthUrl: https://gis.eiteldata.eu/conectoruc3m/health
    authTokenEnv: LOCAL_ASSETS_AUTH_TOKEN
    accessFormUrl: https://www.eiteldata.eu/
    enabled: true
  - id: conectorFuenlabrada
    name: Fuenlabrada Connector
    organization: Ayuntamiento de Fuenlabrada
    publicUrl: https://gis.eiteldata.eu/conectorFuenlabrada/
    catalogUrl: https://gis.eiteldata.eu/conectorFuenlabrada/local-assets/asset-bundles/public
    healthUrl: https://gis.eiteldata.eu/conectorFuenlabrada/health
    authTokenEnv: LOCAL_ASSETS_AUTH_TOKEN
    accessFormUrl: https://www.eiteldata.eu/
    enabled: true
