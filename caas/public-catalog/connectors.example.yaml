title: Catálogo de datos EITEL
subtitle: Activos publicados por los conectores EITEL.
defaultAccessFormUrl: https://www.eiteldata.eu/
connectors:
  - id: conectoruc3m
    name: Conector UC3M
    organization: Universidad Carlos III de Madrid
    publicUrl: https://gis.eiteldata.eu/conectoruc3m/
    catalogUrl: https://gis.eiteldata.eu/conectoruc3m/local-assets/asset-bundles/public
    healthUrl: https://gis.eiteldata.eu/conectoruc3m/health
    credentialUrl: https://eiteldata.uc3m.es/.well-known/vp-UC3Mcompliance.json
    authTokenEnv: UC3M_LOCAL_ASSETS_AUTH_TOKEN
    fallbackAuthTokenEnv: LOCAL_ASSETS_AUTH_TOKEN
    accessFormUrl: https://www.eiteldata.eu/
    enabled: true
  - id: conectorFuenlabrada
    name: Conector Fuenlabrada
    organization: Ayuntamiento de Fuenlabrada
    publicUrl: https://gis.eiteldata.eu/conectorFuenlabrada/
    catalogUrl: https://gis.eiteldata.eu/conectorFuenlabrada/local-assets/asset-bundles/public
    healthUrl: https://gis.eiteldata.eu/conectorFuenlabrada/health
    credentialUrl: https://eiteldata.uc3m.es/.well-known/vp-FUENLAcompliance.json
    authTokenEnv: FUENLABRADA_LOCAL_ASSETS_AUTH_TOKEN
    fallbackAuthTokenEnv: LOCAL_ASSETS_AUTH_TOKEN
    accessFormUrl: https://www.eiteldata.eu/
    enabled: true
