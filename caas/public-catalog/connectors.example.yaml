title: EITEL Public Catalog
subtitle: Metadata-only view of assets published by EITEL connectors.
defaultAccessFormUrl: https://www.eiteldata.eu/
connectors:
  - id: conectoruc3m
    name: UC3M Connector
    organization: Universidad Carlos III de Madrid
    publicUrl: https://gis.eiteldata.eu/conectoruc3m/
