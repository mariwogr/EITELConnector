# Cargar variables de producción con:
# docker compose --env-file .env.production -f docker-compose.fuenlabrada.production.yaml up -d
services:
  edc-postgres:
    image: postgres:15-alpine
    container_name: conectorfuenlabrada-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - conectorfuenlabrada_pg_data:/var/lib/postgresql/data
      - ./deploy/aws/init-conectorfuenlabrada.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - edc-fuenlabrada-net

  conectorfuenlabrada:
    image: eitel/eclipse-edc-runtime:0.16.0
    build:
      context: .
      dockerfile: deploy/Dockerfile
    container_name: conectorfuenlabrada
    restart: always
    depends_on:
      edc-postgres:
        condition: service_healthy
    environment:
      EDC_PARTICIPANT_ID: conectorFuenlabrada
      EDC_PARTICIPANT_CONTEXT_ID: conectorFuenlabrada
      EDC_HOSTNAME: gis.eiteldata.eu
      WEB_HTTP_PORT: 11000
      WEB_HTTP_PATH: /api
      WEB_HTTP_CONTROL_PORT: 11001
      WEB_HTTP_CONTROL_PATH: /api/control
      WEB_HTTP_MANAGEMENT_PORT: 11002
      WEB_HTTP_MANAGEMENT_PATH: /api/management
      WEB_HTTP_PROTOCOL_PORT: 11003
      WEB_HTTP_PROTOCOL_PATH: /api/v1/dsp
      EDC_DSP_CALLBACK_ADDRESS: https://gis.eiteldata.eu/conectorFuenlabrada/api/v1/dsp
      EDC_MANAGEMENT_CONTEXT_ENABLED: "true"
      EDC_TRANSFER_PROXY_TOKEN_SIGNER_PRIVATEKEY_ALIAS: private-key
      EDC_TRANSFER_PROXY_TOKEN_VERIFIER_PUBLICKEY_ALIAS: public-key
      EDC_JDBC_URL: jdbc:postgresql://edc-postgres:5432/conectorfuenlabrada_db
      EDC_JDBC_USER: postgres
      EDC_JDBC_PASSWORD: ${POSTGRES_PASSWORD}
      EDC_API_AUTH_KEY: ${EDC_API_AUTH_KEY}
      EDC_WEB_HTTP_MANAGEMENT_AUTH_DAC_AUDIENCE: conectorFuenlabrada
      EDC_WEB_REST_CORS_ENABLED: "true"
      EDC_WEB_REST_CORS_HEADERS: "origin,content-type,accept,x-api-key,authorization"
      EDC_WEB_REST_CORS_METHODS: "GET,POST,PUT,DELETE,OPTIONS"
      EDC_WEB_REST_CORS_ORIGINS: "https://gis.eiteldata.eu"
    volumes:
      - ./dataspaceconnector-configuration.properties:/opt/edc/dataspaceconnector-configuration.properties:ro
    healthcheck:
      test: ["CMD-SHELL", "curl --fail -X GET http://localhost:11000/api/check/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
    networks:
      - edc-fuenlabrada-net

  conectorfuenlabrada-ui:
    image: eitel/edc-ui:latest
    build:
      context: ./caas/edc-ui
      dockerfile: Dockerfile
    container_name: conectorfuenlabrada-ui
    restart: always
    env_file:
      - path: .env.production
        required: false
    depends_on:
      conectorfuenlabrada:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_MANAGEMENT_API_URL: /conectorFuenlabrada/api/management
      NEXT_PUBLIC_MANAGEMENT_API_AUTH_KEY: ${EDC_API_AUTH_KEY}
      NEXT_PUBLIC_CONNECTOR_NAME: conectorFuenlabrada
      NEXT_PUBLIC_DSP_URL: https://gis.eiteldata.eu/conectorFuenlabrada/api/v1/dsp/2025-1
      NEXT_PUBLIC_UI_VARIANT: production
      NEXT_PUBLIC_STAR_MODE: "false"
      NEXT_PUBLIC_ARCGIS_AUTH_ENABLED: ${ARCGIS_AUTH_ENABLED:-true}
      NEXT_PUBLIC_ARCGIS_PORTAL_URL: ${ARCGIS_PORTAL_URL:-https://gis.eiteldata.eu/arcgis}
      NEXT_PUBLIC_ARCGIS_CLIENT_ID: ${ARCGIS_CLIENT_ID:-arcgisonline}
      NEXT_PUBLIC_ARCGIS_REDIRECT_URI: ${ARCGIS_REDIRECT_URI:-https://gis.eiteldata.eu/conectorFuenlabrada/}
      NEXT_PUBLIC_ARCGIS_REQUIRED_ORG_ID: ${ARCGIS_REQUIRED_ORG_ID:-}
      NEXT_PUBLIC_ARCGIS_REQUIRED_GROUP_ID: ${ARCGIS_REQUIRED_GROUP_ID:-}
    volumes:
      - ./caas/edc-ui/public/index.final.html:/usr/share/nginx/html/index.final.html:ro
      - ./caas/edc-ui/public/index.final.html:/usr/share/nginx/html/index.html:ro
      - ./caas/edc-ui/public/config.template.js:/usr/share/nginx/html/config.template.js:ro
      - ./caas/edc-ui/public/assets:/usr/share/nginx/html/assets:ro
    networks:
      - edc-fuenlabrada-net

  conectorfuenlabrada-local-assets:
    build:
      context: ./caas/control-plane
      dockerfile: Dockerfile
    container_name: conectorfuenlabrada-local-assets
    restart: always
    environment:
      CAAS_LOCAL_ASSETS_INTERNAL_BASE_URL: http://conectorfuenlabrada-local-assets:8081/v1/local-assets/files
      CAAS_LOCAL_ASSETS_PUBLIC_BASE_URL: https://gis.eiteldata.eu/conectorFuenlabrada/local-assets/files
      CAAS_CONNECTOR_PUBLIC_URL: https://gis.eiteldata.eu/conectorFuenlabrada/edc-ui
      # SMTP: descomentar para activar notificaciones por email al owner cuando llega una solicitud
      # CAAS_SMTP_HOST: smtp.example.com
      # CAAS_SMTP_PORT: "587"
      # CAAS_SMTP_USER: user@example.com
      # CAAS_SMTP_PASSWORD: changeme
      # CAAS_SMTP_FROM: conector-fuenlabrada@eiteldata.eu
      # CAAS_SMTP_USE_TLS: "true"
    volumes:
      - conectorfuenlabrada_local_assets_data:/app/data/local-assets
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8081/v1/config', timeout=3).read()\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - edc-fuenlabrada-net

  conectorfuenlabrada-download-sink:
    build:
      context: ./caas/download-sink
      dockerfile: Dockerfile
    container_name: conectorfuenlabrada-download-sink
    restart: always
    volumes:
      - conectorfuenlabrada_download_sink_data:/app/data
    networks:
      - edc-fuenlabrada-net

  conectorfuenlabrada-gateway:
    image: nginx:1.27-alpine
    container_name: conectorfuenlabrada-gateway
    restart: always
    depends_on:
      conectorfuenlabrada-ui:
        condition: service_started
      conectorfuenlabrada:
        condition: service_started
      conectorfuenlabrada-local-assets:
        condition: service_healthy
      conectorfuenlabrada-download-sink:
        condition: service_started
    ports:
      - "12000:80"
    volumes:
      - ./traefik/nginx-fuenlabrada.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - edc-fuenlabrada-net

volumes:
  conectorfuenlabrada_pg_data:
    name: conectorfuenlabrada_pg_data
  conectorfuenlabrada_local_assets_data:
    name: conectorfuenlabrada_local_assets_data
  conectorfuenlabrada_download_sink_data:
    name: conectorfuenlabrada_download_sink_data

networks:
  edc-fuenlabrada-net:
    driver: bridge
