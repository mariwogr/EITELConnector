# Cargar variables de producción con:
# docker compose --env-file .env.production -f docker-compose.production.yaml up -d
services:
  edc-postgres:
    image: postgres:15-alpine
    container_name: conectoruc3m-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./deploy/aws/init-conectoruc3m.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - edc-net

  conectoruc3m:
    image: eitel/eclipse-edc-runtime:0.16.0
    build:
      context: .
      dockerfile: deploy/Dockerfile
    container_name: conectoruc3m
    restart: always
    depends_on:
      edc-postgres:
        condition: service_healthy
    environment:
      EDC_PARTICIPANT_ID: conectoruc3m
      EDC_PARTICIPANT_CONTEXT_ID: conectoruc3m
      EDC_HOSTNAME: gis.eiteldata.eu
      WEB_HTTP_PORT: 11000
      WEB_HTTP_PATH: /api
      WEB_HTTP_CONTROL_PORT: 11001
      WEB_HTTP_CONTROL_PATH: /api/control
      WEB_HTTP_MANAGEMENT_PORT: 11002
      WEB_HTTP_MANAGEMENT_PATH: /api/management
      WEB_HTTP_PROTOCOL_PORT: 11003
      WEB_HTTP_PROTOCOL_PATH: /api/v1/dsp
      EDC_DSP_CALLBACK_ADDRESS: https://gis.eiteldata.eu/conectoruc3m/api/v1/dsp
      EDC_MANAGEMENT_CONTEXT_ENABLED: "true"
      EDC_TRANSFER_PROXY_TOKEN_SIGNER_PRIVATEKEY_ALIAS: private-key
      EDC_TRANSFER_PROXY_TOKEN_VERIFIER_PUBLICKEY_ALIAS: public-key
      EDC_JDBC_URL: jdbc:postgresql://edc-postgres:5432/conectoruc3m_db
      EDC_JDBC_USER: postgres
      EDC_JDBC_PASSWORD: ${POSTGRES_PASSWORD}
      EDC_API_AUTH_KEY: ${EDC_API_AUTH_KEY}
      EDC_WEB_HTTP_MANAGEMENT_AUTH_DAC_AUDIENCE: conectoruc3m
      EDC_WEB_REST_CORS_ENABLED: "true"
      EDC_WEB_REST_CORS_HEADERS: "origin,content-type,accept,x-api-key,authorization"
      EDC_WEB_REST_CORS_METHODS: "GET,POST,PUT,DELETE,OPTIONS"
      EDC_WEB_REST_CORS_ORIGINS: "https://gis.eiteldata.eu"
    volumes:
      - ./dataspaceconnector-configuration.properties:/opt/edc/dataspaceconnector-configuration.properties:ro
    healthcheck:
      test: ["CMD-SHELL", "curl --fail -X GET http://localhost:11000/api/check/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
    networks:
      - edc-net

  conectoruc3m-ui:
    image: eitel/edc-ui:latest
    build:
      context: ./caas/edc-ui
      dockerfile: Dockerfile
    container_name: conectoruc3m-ui
    restart: always
    env_file:
      - path: .env.production
        required: false
    depends_on:
      conectoruc3m:
        condition: service_started
    environment:
      NEXT_PUBLIC_MANAGEMENT_API_URL: /conectoruc3m/api/management
      NEXT_PUBLIC_MANAGEMENT_API_AUTH_KEY: ${EDC_API_AUTH_KEY}
      NEXT_PUBLIC_CONNECTOR_NAME: conectoruc3m
      NEXT_PUBLIC_DSP_URL: https://gis.eiteldata.eu/conectoruc3m/api/v1/dsp
      NEXT_PUBLIC_CONNECTOR_DIRECTORY: '{"conectorFuenlabrada":"https://gis.eiteldata.eu/conectorFuenlabrada/api/v1/dsp","conectoruc3m":"https://gis.eiteldata.eu/conectoruc3m/api/v1/dsp"}'
      NEXT_PUBLIC_UI_VARIANT: production
      NEXT_PUBLIC_STAR_MODE: "false"
      NEXT_PUBLIC_ARCGIS_AUTH_ENABLED: ${ARCGIS_AUTH_ENABLED:-true}
      NEXT_PUBLIC_ARCGIS_PORTAL_URL: ${ARCGIS_PORTAL_URL:-https://gis.eiteldata.eu/arcgis}
      NEXT_PUBLIC_ARCGIS_CLIENT_ID: ${ARCGIS_CLIENT_ID:-arcgisonline}
      NEXT_PUBLIC_ARCGIS_REDIRECT_URI: ${ARCGIS_REDIRECT_URI:-https://gis.eiteldata.eu/conectoruc3m/}
      NEXT_PUBLIC_ARCGIS_REQUIRED_ORG_ID: ${ARCGIS_REQUIRED_ORG_ID:-}
      NEXT_PUBLIC_ARCGIS_REQUIRED_GROUP_ID: ${ARCGIS_UC3M_GROUP_ID:-}
    volumes:
      - ./caas/edc-ui/public/index.final.html:/usr/share/nginx/html/index.final.html:ro
      - ./caas/edc-ui/public/index.final.html:/usr/share/nginx/html/index.html:ro
      - ./caas/edc-ui/public/config.template.js:/usr/share/nginx/html/config.template.js:ro
      - ./caas/edc-ui/public/assets:/usr/share/nginx/html/assets:ro
    networks:
      - edc-net

  conectoruc3m-local-assets:
    build:
      context: ./caas/control-plane
      dockerfile: Dockerfile
    container_name: conectoruc3m-local-assets
    restart: always
    environment:
      CAAS_LOCAL_ASSETS_INTERNAL_BASE_URL: http://conectoruc3m-local-assets:8081/v1/local-assets/files
      CAAS_LOCAL_ASSETS_PUBLIC_BASE_URL: https://gis.eiteldata.eu/conectoruc3m/local-assets/files
      CAAS_LOCAL_ASSETS_AUTH_TOKEN: ${LOCAL_ASSETS_AUTH_TOKEN}
      CAAS_ARCGIS_AUTH_ENABLED: ${ARCGIS_AUTH_ENABLED:-true}
      CAAS_ARCGIS_PORTAL_URL: ${ARCGIS_PORTAL_URL:-https://gis.eiteldata.eu/arcgis}
      CAAS_ARCGIS_REQUIRED_ORG_ID: ${ARCGIS_REQUIRED_ORG_ID:-}
      CAAS_ARCGIS_REQUIRED_GROUP_ID: ${ARCGIS_UC3M_GROUP_ID:-}
      CAAS_CONNECTOR_PUBLIC_URL: https://gis.eiteldata.eu/conectoruc3m/edc-ui
      CAAS_SMTP_HOST: ${CAAS_SMTP_HOST:-}
      CAAS_SMTP_PORT: ${CAAS_SMTP_PORT:-587}
      CAAS_SMTP_USER: ${CAAS_SMTP_USER:-}
      CAAS_SMTP_PASSWORD: ${CAAS_SMTP_PASSWORD:-}
      CAAS_SMTP_FROM: ${CAAS_SMTP_FROM:-EITEL Connector <no-reply@eiteldata.eu>}
      CAAS_SMTP_USE_TLS: ${CAAS_SMTP_USE_TLS:-true}
    volumes:
      - local_assets_data:/app/data/local-assets
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8081/v1/config', timeout=3).read()\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - edc-net

  conectoruc3m-download-sink:
    build:
      context: ./caas/download-sink
      dockerfile: Dockerfile
    container_name: conectoruc3m-download-sink
    restart: always
    environment:
      DOWNLOAD_SINK_AUTH_TOKEN: ${LOCAL_ASSETS_AUTH_TOKEN}
      DOWNLOAD_SINK_ARCGIS_AUTH_ENABLED: ${ARCGIS_AUTH_ENABLED:-true}
      DOWNLOAD_SINK_ARCGIS_PORTAL_URL: ${ARCGIS_PORTAL_URL:-https://gis.eiteldata.eu/arcgis}
      DOWNLOAD_SINK_ARCGIS_REQUIRED_ORG_ID: ${ARCGIS_REQUIRED_ORG_ID:-}
      DOWNLOAD_SINK_ARCGIS_REQUIRED_GROUP_ID: ${ARCGIS_UC3M_GROUP_ID:-}
    volumes:
      - download_sink_data:/app/data
    networks:
      - edc-net

  conectoruc3m-gateway:
    image: nginx:1.27-alpine
    container_name: conectoruc3m-gateway
    restart: always
    depends_on:
      conectoruc3m-ui:
        condition: service_started
      conectoruc3m:
        condition: service_started
      conectoruc3m-local-assets:
        condition: service_healthy
      conectoruc3m-download-sink:
        condition: service_started
    ports:
      - "12000:80"
    volumes:
      - ./traefik/nginx-uc3m.conf:/etc/nginx/conf.d/default.conf:ro
      - ./gaia-x/uc3m/:/etc/nginx/gaia-x/:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - edc-net

volumes:
  pg_data:
    name: conectoruc3m_pg_data
  local_assets_data:
    name: conectoruc3m_local_assets_data
  download_sink_data:
    name: conectoruc3m_download_sink_data

networks:
  edc-net:
    driver: bridge
