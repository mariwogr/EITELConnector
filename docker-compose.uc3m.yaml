services:
  edc-postgres:
    image: postgres:15-alpine
    container_name: edc-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    command: >
      sh -c "echo 'CREATE DATABASE uc3mconector_db;' > /docker-entrypoint-initdb.d/init.sql && docker-entrypoint.sh postgres"
    networks:
      - edc-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  uc3mconector:
    image: ghcr.io/sovity/edc-ce:latest
    container_name: uc3mconector-edc
    depends_on:
      edc-postgres:
        condition: service_healthy
    environment:
      EDC_PARTICIPANT_ID: uc3mconector
      SOVITY_DEPLOYMENT_KIND: control-plane-with-integrated-data-plane
      SOVITY_DATASPACE_KIND: sovity-mock-iam
      SOVITY_FIRST_PORT: 11000
      SOVITY_EDC_FQDN_PUBLIC: gis.eiteldata.eu
      EDC_DSP_CALLBACK_ADDRESS: https://gis.eiteldata.eu/conectoruc3m/api/v1/dsp
      SOVITY_JDBC_URL: jdbc:postgresql://edc-postgres:5432/uc3mconector_db
      SOVITY_JDBC_USER: postgres
      SOVITY_JDBC_PASSWORD: password
      EDC_API_AUTH_KEY: password123
      EDC_UI_WRAPPER_ENABLED: "true"
      EDC_WEB_REST_CORS_ENABLED: "true"
      EDC_WEB_REST_CORS_HEADERS: "origin,content-type,accept,x-api-key,authorization"
      EDC_WEB_REST_CORS_METHODS: "GET,POST,PUT,DELETE,OPTIONS"
      EDC_WEB_REST_CORS_ORIGINS: "https://gis.eiteldata.eu"
    networks:
      - edc-net

  uc3mconector-ui:
    image: ghcr.io/sovity/edc-ce-ui:latest
    container_name: uc3mconector-ui
    depends_on:
      - uc3mconector
    environment:
      NEXT_PUBLIC_MANAGEMENT_API_URL: /conectoruc3m/api/management
      NEXT_PUBLIC_MANAGEMENT_API_AUTH_KEY: password123
      NEXT_PUBLIC_CONNECTOR_NAME: "UC3MCONector"
      EDC_UI_MANAGEMENT_API_URL: http://uc3mconector:11002/api/management
      EDC_UI_MANAGEMENT_API_AUTH_KEY: password123
    networks:
      - edc-net

  uc3mconector-gateway:
    image: nginx:1.27-alpine
    container_name: uc3mconector-gateway
    depends_on:
      - uc3mconector-ui
      - uc3mconector
    ports:
      - "12000:80"
    volumes:
      - ./traefik/nginx-uc3m.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - edc-net

networks:
  edc-net:
    driver: bridge
