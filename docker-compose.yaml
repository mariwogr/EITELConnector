services:
  edc-postgres:
    image: postgres:15-alpine
    container_name: conectoruc3m-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: change-me
    command: >
      sh -c "echo 'CREATE DATABASE conectoruc3m_db;' > /docker-entrypoint-initdb.d/init.sql && docker-entrypoint.sh postgres"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - edc-net

  conectoruc3m:
    image: eitel/eclipse-edc-runtime:0.16.0
    container_name: conectoruc3m
    depends_on:
      edc-postgres:
        condition: service_healthy
    environment:
      EDC_PARTICIPANT_ID: conectoruc3m
      EDC_PARTICIPANT_CONTEXT_ID: conectoruc3m
      EDC_HOSTNAME: conectoruc3m
      WEB_HTTP_PORT: 11000
      WEB_HTTP_PATH: /api
      WEB_HTTP_CONTROL_PORT: 11001
      WEB_HTTP_CONTROL_PATH: /api/control
      WEB_HTTP_MANAGEMENT_PORT: 11002
      WEB_HTTP_MANAGEMENT_PATH: /management
      WEB_HTTP_PROTOCOL_PORT: 11003
      WEB_HTTP_PROTOCOL_PATH: /api/v1/dsp
      EDC_DSP_CALLBACK_ADDRESS: http://conectoruc3m:11003/api/v1/dsp
      EDC_MANAGEMENT_CONTEXT_ENABLED: "true"
      EDC_TRANSFER_PROXY_TOKEN_SIGNER_PRIVATEKEY_ALIAS: private-key
      EDC_TRANSFER_PROXY_TOKEN_VERIFIER_PUBLICKEY_ALIAS: public-key
      EDC_JDBC_URL: jdbc:postgresql://edc-postgres:5432/conectoruc3m_db
      EDC_JDBC_USER: postgres
      EDC_JDBC_PASSWORD: change-me
      EDC_API_AUTH_KEY: change-me
      EDC_WEB_HTTP_MANAGEMENT_AUTH_DAC_AUDIENCE: conectoruc3m
      EDC_WEB_REST_CORS_ENABLED: "true"
      EDC_WEB_REST_CORS_HEADERS: "origin,content-type,accept,x-api-key,authorization"
      EDC_WEB_REST_CORS_METHODS: "GET,POST,PUT,DELETE,OPTIONS"
      EDC_WEB_REST_CORS_ORIGINS: "http://localhost:12000"
    volumes:
      - ./dataspaceconnector-configuration.properties:/opt/edc/dataspaceconnector-configuration.properties:ro
    healthcheck:
      test: ["CMD-SHELL", "curl --fail -X GET http://localhost:11000/api/check/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
    networks:
      - edc-net

  conectoruc3m-ui:
    image: eitel/edc-ui:latest
    container_name: conectoruc3m-ui
    depends_on:
      conectoruc3m:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_MANAGEMENT_API_URL: /conectoruc3m/api/management
      NEXT_PUBLIC_MANAGEMENT_API_AUTH_KEY: change-me
      NEXT_PUBLIC_LOCAL_ASSETS_AUTH_TOKEN: change-me
      NEXT_PUBLIC_CONNECTOR_NAME: conectoruc3m
      NEXT_PUBLIC_DSP_URL: http://conectoruc3m:11003/api/v1/dsp/2025-1
    volumes:
      - ./caas/edc-ui/public/index.final.html:/usr/share/nginx/html/index.final.html:ro
      - ./caas/edc-ui/public/index.final.html:/usr/share/nginx/html/index.html:ro
      - ./caas/edc-ui/public/config.template.js:/usr/share/nginx/html/config.template.js:ro
    networks:
      - edc-net

  conectoruc3m-local-assets:
    build:
      context: ./caas/control-plane
      dockerfile: Dockerfile
    container_name: conectoruc3m-local-assets
    environment:
      CAAS_LOCAL_ASSETS_INTERNAL_BASE_URL: http://conectoruc3m-local-assets:8081/v1/local-assets/files
      CAAS_LOCAL_ASSETS_PUBLIC_BASE_URL: http://localhost:12000/conectoruc3m/local-assets/files
      CAAS_LOCAL_ASSETS_AUTH_TOKEN: change-me
    volumes:
      - local_assets_data:/app/data/local-assets
    networks:
      - edc-net

  conectoruc3m-download-sink:
    build:
      context: ./caas/download-sink
      dockerfile: Dockerfile
    container_name: conectoruc3m-download-sink
    environment:
      DOWNLOAD_SINK_AUTH_TOKEN: change-me
    volumes:
      - download_sink_data:/app/data
    networks:
      - edc-net

  conectoruc3m-gateway:
    image: nginx:1.27-alpine
    container_name: conectoruc3m-gateway
    depends_on:
      - conectoruc3m-ui
      - conectoruc3m
      - conectoruc3m-local-assets
      - conectoruc3m-download-sink
    ports:
      - "12000:80"
    volumes:
      - ./traefik/nginx-uc3m.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - edc-net

networks:
  edc-net:
    driver: bridge

volumes:
  local_assets_data:
  download_sink_data:
