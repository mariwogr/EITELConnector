server {
    listen 80;
    server_name _;

    location = /health {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    location /api/management/ {
        proxy_pass http://${NGINX_CONNECTOR_UPSTREAM}:11002/api/management/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header x-api-key "${NGINX_MANAGEMENT_API_KEY}";
    }

    location = /api/management {
        proxy_pass http://${NGINX_CONNECTOR_UPSTREAM}:11002/api/management;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header x-api-key "${NGINX_MANAGEMENT_API_KEY}";
    }

    location /${NGINX_CONNECTOR_PREFIX}/api/management/ {
        rewrite ^/${NGINX_CONNECTOR_PREFIX}/api/management/(.*)$ /api/management/$1 break;
        proxy_pass http://${NGINX_CONNECTOR_UPSTREAM}:11002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /${NGINX_CONNECTOR_PREFIX};
        proxy_set_header x-api-key "${NGINX_MANAGEMENT_API_KEY}";
    }

    location = /${NGINX_CONNECTOR_PREFIX}/api/management {
        rewrite ^/${NGINX_CONNECTOR_PREFIX}/api/management$ /api/management break;
        proxy_pass http://${NGINX_CONNECTOR_UPSTREAM}:11002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /${NGINX_CONNECTOR_PREFIX};
        proxy_set_header x-api-key "${NGINX_MANAGEMENT_API_KEY}";
    }

    location /api/v1/dsp {
        proxy_pass http://${NGINX_CONNECTOR_UPSTREAM}:11003/api/v1/dsp;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /${NGINX_CONNECTOR_PREFIX}/health {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    location = /${NGINX_CONNECTOR_PREFIX} {
        return 301 /${NGINX_CONNECTOR_PREFIX}/;
    }

    location /${NGINX_CONNECTOR_PREFIX}/api/v1/dsp {
        rewrite ^/${NGINX_CONNECTOR_PREFIX}/api/v1/dsp/?(.*)$ /api/v1/dsp/$1 break;
        proxy_pass http://${NGINX_CONNECTOR_UPSTREAM}:11003/api/v1/dsp;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /${NGINX_CONNECTOR_PREFIX};
    }

    location /${NGINX_CONNECTOR_PREFIX}/local-assets/ {
        rewrite ^/${NGINX_CONNECTOR_PREFIX}/local-assets/(.*)$ /v1/local-assets/$1 break;
        proxy_pass http://${NGINX_LOCAL_ASSETS_UPSTREAM};
        proxy_http_version 1.1;
        client_max_body_size 200m;
        proxy_request_buffering off;
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /${NGINX_CONNECTOR_PREFIX};
    }

    location /${NGINX_CONNECTOR_PREFIX}/download-sink/ {
        rewrite ^/${NGINX_CONNECTOR_PREFIX}/download-sink/(.*)$ /$1 break;
        proxy_pass http://${NGINX_DOWNLOAD_SINK_UPSTREAM};
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /${NGINX_CONNECTOR_PREFIX};
    }

    location /${NGINX_CONNECTOR_PREFIX}/ {
        rewrite ^/${NGINX_CONNECTOR_PREFIX}/(.*)$ /$1 break;
        proxy_pass http://${NGINX_UI_UPSTREAM};
        proxy_http_version 1.1;
        proxy_set_header Accept-Encoding "";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /${NGINX_CONNECTOR_PREFIX};
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        sub_filter_once off;
        sub_filter_types text/html;
        sub_filter 'href="/_next/' 'href="/${NGINX_CONNECTOR_PREFIX}/_next/';
        sub_filter 'src="/_next/' 'src="/${NGINX_CONNECTOR_PREFIX}/_next/';
        sub_filter 'href="/sovity_logo.svg"' 'href="/${NGINX_CONNECTOR_PREFIX}/sovity_logo.svg"';
        sub_filter 'src="/sovity_logo.svg"' 'src="/${NGINX_CONNECTOR_PREFIX}/sovity_logo.svg"';
        sub_filter 'href="/' 'href="/${NGINX_CONNECTOR_PREFIX}/';
        sub_filter 'src="/' 'src="/${NGINX_CONNECTOR_PREFIX}/';
    }

    location = / {
        return 301 /${NGINX_CONNECTOR_PREFIX}/;
    }
}