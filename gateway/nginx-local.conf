server {
    listen 80;
    server_name _;

    location = /health {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    location /api/management/ {
        proxy_pass http://conectoruc3m:11002/api/management/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header x-api-key $http_x_api_key;
    }

    location = /api/management {
        proxy_pass http://conectoruc3m:11002/api/management;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header x-api-key $http_x_api_key;
    }

    location /api/v1/dsp {
        proxy_pass http://conectoruc3m:11003/api/v1/dsp;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /local-assets/ {
        rewrite ^/local-assets/(.*)$ /v1/local-assets/$1 break;
        proxy_pass http://conectoruc3m-local-assets:8081;
        proxy_http_version 1.1;
        client_max_body_size 200m;
        proxy_request_buffering off;
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /download-sink/ {
        rewrite ^/download-sink/(.*)$ /$1 break;
        proxy_pass http://conectoruc3m-download-sink:8082;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/conector[^/]+/?$ {
        return 302 $scheme://$http_host/;
    }

    location ~ ^/conector[^/]+/(.*)$ {
        return 302 $scheme://$http_host/$1$is_args$args;
    }

    location / {
        proxy_pass http://conectoruc3m-ui:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
