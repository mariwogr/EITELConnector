services:
  edc-postgres:
    image: postgres:15-alpine
    container_name: edc-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    command: >
      sh -c "echo 'CREATE DATABASE provider_db; CREATE DATABASE consumer_db;' > /docker-entrypoint-initdb.d/init.sql && docker-entrypoint.sh postgres"
    ports:
      - "5432:5432"
    networks:
      - edc-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  provider:
    image: ghcr.io/sovity/edc-ce:latest
    container_name: provider-edc
    depends_on:
      edc-postgres:
        condition: service_healthy
    ports:
      - "11001:11001"
      - "11002:11002"
      - "11003:11003"
    environment:
      EDC_PARTICIPANT_ID: provider
      SOVITY_DEPLOYMENT_KIND: control-plane-with-integrated-data-plane
      SOVITY_DATASPACE_KIND: sovity-mock-iam
      SOVITY_FIRST_PORT: 11000
      # IMPORTANTE: FQDN_PUBLIC debe ser el nombre del contenedor para la red interna
      SOVITY_EDC_FQDN_PUBLIC: provider-edc
      EDC_DSP_CALLBACK_ADDRESS: http://provider-edc:11003/api/v1/dsp
      SOVITY_JDBC_URL: jdbc:postgresql://edc-postgres:5432/provider_db
      SOVITY_JDBC_USER: postgres
      SOVITY_JDBC_PASSWORD: password
      EDC_API_AUTH_KEY: password123
      EDC_UI_WRAPPER_ENABLED: "true" 
      EDC_WEB_REST_CORS_ENABLED: "true"
      EDC_WEB_REST_CORS_HEADERS: "origin,content-type,accept,x-api-key,authorization"
      EDC_WEB_REST_CORS_METHODS: "GET,POST,PUT,DELETE,OPTIONS"
      EDC_WEB_REST_CORS_ORIGINS: "http://localhost:12000"
    networks:
      - edc-net

  consumer:
    image: ghcr.io/sovity/edc-ce:latest
    container_name: consumer-edc
    depends_on:
      edc-postgres:
        condition: service_healthy
    ports:
      - "21001:21001"
      - "21002:21002"
      - "21003:21003"
    environment:
      EDC_PARTICIPANT_ID: consumer
      SOVITY_DEPLOYMENT_KIND: control-plane-with-integrated-data-plane
      SOVITY_DATASPACE_KIND: sovity-mock-iam
      SOVITY_FIRST_PORT: 21000
      SOVITY_EDC_FQDN_PUBLIC: consumer-edc
      EDC_DSP_CALLBACK_ADDRESS: http://consumer-edc:21003/api/v1/dsp
      SOVITY_JDBC_URL: jdbc:postgresql://edc-postgres:5432/consumer_db
      SOVITY_JDBC_USER: postgres
      SOVITY_JDBC_PASSWORD: password
      EDC_API_AUTH_KEY: password123
      EDC_UI_WRAPPER_ENABLED: "true"
      EDC_WEB_REST_CORS_ENABLED: "true"
      EDC_WEB_REST_CORS_HEADERS: "origin,content-type,accept,x-api-key,authorization"
      EDC_WEB_REST_CORS_METHODS: "GET,POST,PUT,DELETE,OPTIONS"
      EDC_WEB_REST_CORS_ORIGINS: "http://localhost:13000"
    networks:
      - edc-net

  provider-ui:
    image: ghcr.io/sovity/edc-ce-ui:latest
    container_name: provider-ui
    ports:
      - "12000:8080"
    environment:
      # Browser side: usa localhost
      NEXT_PUBLIC_MANAGEMENT_API_URL: http://localhost:11002/api/management
      NEXT_PUBLIC_MANAGEMENT_API_AUTH_KEY: password123
      NEXT_PUBLIC_CONNECTOR_NAME: "PROVIDER"
      # Server side: usa el nombre del contenedor
      EDC_UI_MANAGEMENT_API_URL: http://provider-edc:11002/api/management
      EDC_UI_MANAGEMENT_API_AUTH_KEY: password123
    networks:
      - edc-net

  consumer-ui:
    image: ghcr.io/sovity/edc-ce-ui:latest
    container_name: consumer-ui
    ports:
      - "13000:8080"
    environment:
      NEXT_PUBLIC_MANAGEMENT_API_URL: http://localhost:21002/api/management
      NEXT_PUBLIC_MANAGEMENT_API_AUTH_KEY: password123
      NEXT_PUBLIC_CONNECTOR_NAME: "CONSUMER"
      EDC_UI_MANAGEMENT_API_URL: http://consumer-edc:21002/api/management
      EDC_UI_MANAGEMENT_API_AUTH_KEY: password123
    networks:
      - edc-net

networks:
  edc-net:
    driver: bridge