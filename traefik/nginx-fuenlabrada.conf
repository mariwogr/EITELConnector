server {
    listen 80;
    server_name _;

    location = /health {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    location /api/management/ {
        proxy_pass http://conectorfuenlabrada:11002/api/management/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header x-api-key "change-me";
    }

    location = /api/management {
        proxy_pass http://conectorfuenlabrada:11002/api/management;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header x-api-key "change-me";
    }

    location /conectorFuenlabrada/api/management/ {
        rewrite ^/conectorFuenlabrada/api/management/(.*)$ /api/management/$1 break;
        proxy_pass http://conectorfuenlabrada:11002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /conectorFuenlabrada;
        proxy_set_header x-api-key "change-me";
    }

    location /conectorfuenlabrada/api/management/ {
        rewrite ^/conectorfuenlabrada/api/management/(.*)$ /api/management/$1 break;
        proxy_pass http://conectorfuenlabrada:11002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /conectorFuenlabrada;
        proxy_set_header x-api-key "change-me";
    }

    location = /conectorFuenlabrada/api/management {
        rewrite ^/conectorFuenlabrada/api/management$ /api/management break;
        proxy_pass http://conectorfuenlabrada:11002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /conectorFuenlabrada;
        proxy_set_header x-api-key "change-me";
    }

    location = /conectorfuenlabrada/api/management {
        rewrite ^/conectorfuenlabrada/api/management$ /api/management break;
        proxy_pass http://conectorfuenlabrada:11002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /conectorFuenlabrada;
        proxy_set_header x-api-key "change-me";
    }

    location /api/v1/dsp {
        proxy_pass http://conectorfuenlabrada:11003/api/v1/dsp;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /conectorFuenlabrada/health {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    location = /conectorfuenlabrada/health {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    location = /conectorFuenlabrada {
        return 301 /conectorFuenlabrada/;
    }

    location = /conectorfuenlabrada {
        return 301 /conectorFuenlabrada/;
    }

    location /conectorFuenlabrada/api/v1/dsp {
        rewrite ^/conectorFuenlabrada/api/v1/dsp/?(.*)$ /api/v1/dsp/$1 break;
        proxy_pass http://conectorfuenlabrada:11003/api/v1/dsp;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /conectorFuenlabrada;
    }

    location /conectorfuenlabrada/api/v1/dsp {
        rewrite ^/conectorfuenlabrada/api/v1/dsp/?(.*)$ /api/v1/dsp/$1 break;
        proxy_pass http://conectorfuenlabrada:11003/api/v1/dsp;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /conectorFuenlabrada;
    }

    location /conectorFuenlabrada/local-assets/ {
        rewrite ^/conectorFuenlabrada/local-assets/(.*)$ /v1/local-assets/$1 break;
        proxy_pass http://conectorfuenlabrada-local-assets:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /conectorFuenlabrada;
    }

    location /conectorfuenlabrada/local-assets/ {
        rewrite ^/conectorfuenlabrada/local-assets/(.*)$ /v1/local-assets/$1 break;
        proxy_pass http://conectorfuenlabrada-local-assets:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /conectorFuenlabrada;
    }

    location /conectorFuenlabrada/ {
        rewrite ^/conectorFuenlabrada/(.*)$ /$1 break;
        proxy_pass http://conectorfuenlabrada-ui:8080;
        proxy_http_version 1.1;
        proxy_set_header Accept-Encoding "";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /conectorFuenlabrada;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        sub_filter_once off;
        sub_filter_types text/html;
        sub_filter 'href="/_next/' 'href="/conectorFuenlabrada/_next/';
        sub_filter 'src="/_next/' 'src="/conectorFuenlabrada/_next/';
        sub_filter 'href="/sovity_logo.svg"' 'href="/conectorFuenlabrada/sovity_logo.svg"';
        sub_filter 'src="/sovity_logo.svg"' 'src="/conectorFuenlabrada/sovity_logo.svg"';
        sub_filter 'href="/' 'href="/conectorFuenlabrada/';
        sub_filter 'src="/' 'src="/conectorFuenlabrada/';
    }

    location /conectorfuenlabrada/ {
        rewrite ^/conectorfuenlabrada/(.*)$ /$1 break;
        proxy_pass http://conectorfuenlabrada-ui:8080;
        proxy_http_version 1.1;
        proxy_set_header Accept-Encoding "";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /conectorFuenlabrada;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        sub_filter_once off;
        sub_filter_types text/html;
        sub_filter 'href="/_next/' 'href="/conectorFuenlabrada/_next/';
        sub_filter 'src="/_next/' 'src="/conectorFuenlabrada/_next/';
        sub_filter 'href="/sovity_logo.svg"' 'href="/conectorFuenlabrada/sovity_logo.svg"';
        sub_filter 'src="/sovity_logo.svg"' 'src="/conectorFuenlabrada/sovity_logo.svg"';
        sub_filter 'href="/' 'href="/conectorFuenlabrada/';
        sub_filter 'src="/' 'src="/conectorFuenlabrada/';
    }

    location = / {
        return 301 /conectorFuenlabrada/;
    }
}
