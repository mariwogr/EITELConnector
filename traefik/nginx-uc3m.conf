server {
    listen 80;
    server_name _;

    location ~ ^/(contracts|catalog|data-offers|assets|policies|transfer-history|vault-secrets)(/.*)?$ {
        return 302 /conectoruc3m$uri$is_args$args;
    }

    location = /health {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    location /api/management/ {
        proxy_pass http://conectoruc3m:11002/api/management/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/management {
        proxy_pass http://conectoruc3m:11002/api/management;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /conectoruc3m/api/management/ {
        rewrite ^/conectoruc3m/api/management/(.*)$ /api/management/$1 break;
        proxy_pass http://conectoruc3m:11002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /conectoruc3m;
    }

    location = /conectoruc3m/api/management {
        rewrite ^/conectoruc3m/api/management$ /api/management break;
        proxy_pass http://conectoruc3m:11002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /conectoruc3m;
    }

    location /api/v1/dsp {
        proxy_pass http://conectoruc3m:11003/api/v1/dsp;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /conectoruc3m/health {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    location = /conectoruc3m {
        return 301 /conectoruc3m/;
    }

    location /conectoruc3m/api/v1/dsp {
        rewrite ^/conectoruc3m/api/v1/dsp/?(.*)$ /api/v1/dsp/$1 break;
        proxy_pass http://conectoruc3m:11003/api/v1/dsp;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /conectoruc3m;
    }

    location /conectoruc3m/ {
        rewrite ^/conectoruc3m/(.*)$ /$1 break;
        proxy_pass http://conectoruc3m-ui:8080;
        proxy_http_version 1.1;
        proxy_set_header Accept-Encoding "";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /conectoruc3m;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        sub_filter_once off;
        sub_filter_types text/html;
        sub_filter 'href="/_next/' 'href="/conectoruc3m/_next/';
        sub_filter 'src="/_next/' 'src="/conectoruc3m/_next/';
        sub_filter 'href="/sovity_logo.svg"' 'href="/conectoruc3m/sovity_logo.svg"';
        sub_filter 'src="/sovity_logo.svg"' 'src="/conectoruc3m/sovity_logo.svg"';
        sub_filter 'href="/' 'href="/conectoruc3m/';
        sub_filter 'src="/' 'src="/conectoruc3m/';
    }

    location / {
        proxy_pass http://conectoruc3m-ui:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
